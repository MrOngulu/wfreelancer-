<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WFreelancers — AI Software & Digital Products</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #050508;
  --bg2:      #0c0c12;
  --bg3:      #12121a;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.13);
  --white:    #f0f0f8;
  --muted:    #6b6b80;
  --muted2:   #9090a8;
  --ai:       #7c6dfa;
  --ai-light: #a99dfc;
  --ai-dim:   rgba(124,109,250,0.12);
  --ai-dim2:  rgba(124,109,250,0.2);
  --green:    #22d787;
  --green-dim:rgba(34,215,135,0.1);
  --amber:    #f5a623;
  --red:      #ff4d6d;
  --head: 'Space Grotesk', sans-serif;
  --mono: 'Space Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--white);font-family:var(--head);font-size:16px;line-height:1.6;overflow-x:hidden}
a{text-decoration:none;color:inherit}
ul{list-style:none}
img{max-width:100%;display:block}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── NAV ── */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2.5rem;height:64px;
  background:rgba(5,5,8,0.8);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-logo-mark{
  width:32px;height:32px;border-radius:8px;
  background:var(--ai);display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:12px;font-weight:700;color:#fff;
  letter-spacing:-1px;
}
.nav-name{font-size:1rem;font-weight:600;letter-spacing:-0.02em}
.nav-name span{color:var(--ai-light)}
.nav-links{display:flex;gap:2rem}
.nav-links a{font-size:0.85rem;font-weight:400;color:var(--muted);transition:color .2s}
.nav-links a:hover{color:var(--white)}
.nav-right{display:flex;align-items:center;gap:1rem}
.nav-btn{
  padding:0.45rem 1.1rem;border-radius:8px;font-size:0.8rem;font-weight:600;
  background:var(--ai);color:#fff;border:none;cursor:pointer;
  font-family:var(--head);transition:opacity .2s;
}
.nav-btn:hover{opacity:.85}
.hamburger{display:none;flex-direction:column;gap:4px;cursor:pointer;padding:4px}
.hamburger span{width:22px;height:2px;background:var(--muted2);border-radius:1px;transition:all .3s}
.mobile-menu{
  display:none;position:fixed;top:64px;left:0;right:0;z-index:199;
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:1.5rem 2rem;flex-direction:column;gap:1.25rem;
}
.mobile-menu a{font-size:1rem;color:var(--muted2)}

/* ── HERO ── */
.hero{
  min-height:100vh;display:flex;align-items:center;
  padding:7rem 2.5rem 5rem;position:relative;overflow:hidden;
}
.hero-noise{
  position:absolute;inset:0;
  background-image:
    radial-gradient(ellipse 80% 60% at 60% 30%, rgba(124,109,250,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 20% 80%, rgba(34,215,135,0.04) 0%, transparent 50%);
}
.hero-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:80px 80px;
  mask-image:radial-gradient(ellipse 100% 80% at 50% 50%,black 30%,transparent 80%);
}
.hero-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center;position:relative;width:100%}
.hero-tag{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--ai-dim);border:1px solid var(--ai-dim2);
  padding:.3rem .85rem;border-radius:100px;
  font-size:.75rem;font-family:var(--mono);color:var(--ai-light);
  margin-bottom:1.5rem;letter-spacing:.04em;
}
.hero-tag::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--ai);display:block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hero h1{
  font-size:clamp(2.5rem,5vw,4rem);font-weight:700;line-height:1.05;
  letter-spacing:-0.04em;margin-bottom:1.25rem;
}
.hero h1 .line2{color:var(--ai-light)}
.hero-sub{font-size:1.05rem;color:var(--muted2);font-weight:400;max-width:440px;margin-bottom:2rem;line-height:1.7}
.hero-actions{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:2.5rem}
.btn-ai{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--ai);color:#fff;padding:.75rem 1.5rem;border-radius:10px;
  font-weight:600;font-size:.9rem;border:none;cursor:pointer;
  font-family:var(--head);transition:all .2s;
}
.btn-ai:hover{background:#6a5ce8;transform:translateY(-1px)}
.btn-ghost{
  display:inline-flex;align-items:center;gap:8px;
  background:transparent;color:var(--white);padding:.75rem 1.5rem;border-radius:10px;
  font-weight:500;font-size:.9rem;
  border:1px solid var(--border2);cursor:pointer;
  font-family:var(--head);transition:all .2s;
}
.btn-ghost:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.25)}
.hero-trust{display:flex;gap:1.5rem;flex-wrap:wrap}
.trust-item{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted)}
.trust-dot{width:5px;height:5px;border-radius:50%;background:var(--green)}

/* ── HERO RIGHT: LIVE CARD ── */
.hero-visual{position:relative}
.product-hero-card{
  background:var(--bg3);border:1px solid var(--border2);border-radius:20px;
  overflow:hidden;
}
.phc-header{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;
}
.phc-dots{display:flex;gap:6px}
.phc-dot{width:10px;height:10px;border-radius:50%}
.phc-title{font-family:var(--mono);font-size:.72rem;color:var(--muted)}
.phc-body{padding:1.25rem}
.phc-label{font-size:.68rem;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem}
.phc-name{font-size:1.1rem;font-weight:600;margin-bottom:.25rem}
.phc-tag{
  display:inline-block;background:var(--ai-dim);color:var(--ai-light);
  font-size:.68rem;padding:.2rem .6rem;border-radius:100px;
  font-family:var(--mono);margin-bottom:1rem;border:1px solid var(--ai-dim2);
}
.phc-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem;margin-bottom:1rem}
.phc-metric{background:var(--bg2);border-radius:10px;padding:.75rem;text-align:center}
.phc-mval{font-size:1.1rem;font-weight:700;font-family:var(--mono);color:var(--green)}
.phc-mlab{font-size:.65rem;color:var(--muted);margin-top:2px}
.phc-chart{height:60px;position:relative;overflow:hidden;border-radius:8px;background:var(--bg2);margin-bottom:1rem}
.chart-line{position:absolute;bottom:0;left:0;right:0;height:100%}
.phc-footer{display:flex;align-items:center;justify-content:space-between}
.phc-price{font-family:var(--mono);font-size:1.35rem;font-weight:700;color:var(--white)}
.phc-price span{font-size:.75rem;color:var(--muted);font-weight:400}
.btn-buy-sm{
  background:var(--ai);color:#fff;padding:.5rem 1.1rem;border-radius:8px;
  font-size:.8rem;font-weight:600;border:none;cursor:pointer;font-family:var(--head);
  transition:opacity .2s;
}
.btn-buy-sm:hover{opacity:.85}
.floating-badge{
  position:absolute;top:-12px;right:-12px;
  background:var(--green);color:#050508;
  font-size:.68rem;font-weight:700;font-family:var(--mono);
  padding:.3rem .75rem;border-radius:100px;
  animation:float 3s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* ── SECTION BASE ── */
.section{padding:6rem 2.5rem}
.container{max-width:1100px;margin:0 auto}
.s-label{font-size:.7rem;font-family:var(--mono);text-transform:uppercase;letter-spacing:.12em;color:var(--ai);margin-bottom:.75rem}
.s-title{font-size:clamp(1.8rem,3.5vw,2.75rem);font-weight:700;letter-spacing:-0.03em;margin-bottom:1rem;line-height:1.1}
.s-sub{font-size:1rem;color:var(--muted2);max-width:500px;font-weight:400}

/* ── FEATURED PRODUCTS ── */
.featured-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-radius:20px;overflow:hidden;margin-top:3rem}
.feat-card{background:var(--bg2);padding:2rem;transition:background .25s;position:relative;cursor:pointer}
.feat-card:hover{background:var(--bg3)}
.feat-icon{
  width:52px;height:52px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;margin-bottom:1.25rem;
}
.feat-icon.ai-icon{background:var(--ai-dim);border:1px solid var(--ai-dim2)}
.feat-icon.green-icon{background:var(--green-dim);border:1px solid rgba(34,215,135,.2)}
.feat-icon.amber-icon{background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.2)}
.feat-badge{
  position:absolute;top:1.25rem;right:1.25rem;
  font-size:.65rem;font-family:var(--mono);font-weight:700;text-transform:uppercase;
  padding:.2rem .6rem;border-radius:100px;
}
.badge-ai{background:var(--ai-dim);color:var(--ai-light);border:1px solid var(--ai-dim2)}
.badge-new{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,215,135,.2)}
.badge-soon{background:rgba(255,255,255,.04);color:var(--muted);border:1px solid var(--border)}
.feat-name{font-size:1.1rem;font-weight:600;margin-bottom:.5rem}
.feat-desc{font-size:.85rem;color:var(--muted2);line-height:1.6;margin-bottom:1.25rem}
.feat-price{font-family:var(--mono);font-size:1.2rem;font-weight:700;color:var(--white)}
.feat-price .per{font-size:.75rem;color:var(--muted);font-weight:400;font-family:var(--head)}

/* ── ALL PRODUCTS STORE ── */
.store-bg{background:var(--bg2)}
.filter-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:2.5rem}
.filt{
  padding:.35rem .9rem;border-radius:8px;font-size:.78rem;font-weight:500;
  border:1px solid var(--border);background:transparent;color:var(--muted);
  cursor:pointer;transition:all .2s;font-family:var(--head);
}
.filt:hover{color:var(--white);border-color:var(--border2)}
.filt.on{background:var(--ai);color:#fff;border-color:var(--ai)}
.store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:1rem}
.store-card{
  background:var(--bg);border:1px solid var(--border);border-radius:16px;
  overflow:hidden;transition:transform .25s,border-color .25s;cursor:pointer;
}
.store-card:hover{transform:translateY(-3px);border-color:var(--border2)}
.sc-thumb{
  height:150px;display:flex;align-items:center;justify-content:center;
  position:relative;font-size:2.5rem;
}
.sc-thumb.t-ai{background:linear-gradient(135deg,#0d0b1e,#1a1530)}
.sc-thumb.t-trade{background:linear-gradient(135deg,#040f08,#0a1f10)}
.sc-thumb.t-web{background:linear-gradient(135deg,#0a0a14,#141428)}
.sc-thumb.t-mob{background:linear-gradient(135deg,#0f0a1a,#1e1035)}
.sc-thumb.t-ui{background:linear-gradient(135deg,#12080f,#1e0d1a)}
.sc-thumb.t-saas{background:linear-gradient(135deg,#080f12,#0d1e22)}
.sc-badge{
  position:absolute;top:10px;left:10px;
  font-size:.65rem;font-family:var(--mono);font-weight:700;
  padding:.2rem .55rem;border-radius:100px;
}
.sc-body{padding:1.1rem}
.sc-cat{font-size:.68rem;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.35rem}
.sc-name{font-size:.95rem;font-weight:600;margin-bottom:.4rem}
.sc-desc{font-size:.8rem;color:var(--muted2);line-height:1.55;margin-bottom:1rem}
.sc-foot{display:flex;align-items:center;justify-content:space-between}
.sc-price{font-family:var(--mono);font-size:1.05rem;font-weight:700}
.btn-sm{
  background:var(--bg3);color:var(--white);border:1px solid var(--border2);
  border-radius:8px;padding:.4rem 1rem;font-size:.75rem;font-weight:600;
  cursor:pointer;font-family:var(--head);transition:all .2s;
}
.btn-sm:hover{background:var(--ai);border-color:var(--ai);color:#fff}

/* ── AI SPOTLIGHT ── */
.spotlight{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center;padding:6rem 2.5rem}
.spotlight.rev{direction:rtl}
.spotlight.rev>*{direction:ltr}
.spot-visual{background:var(--bg2);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.spot-screen{padding:1.25rem}
.terminal{
  background:var(--bg);border-radius:12px;padding:1.25rem;
  font-family:var(--mono);font-size:.78rem;line-height:1.8;
}
.t-comment{color:var(--muted)}
.t-keyword{color:var(--ai-light)}
.t-string{color:var(--green)}
.t-num{color:var(--amber)}
.t-output{color:var(--white)}
.spot-stats{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;padding:1.25rem;border-top:1px solid var(--border)}
.spot-stat{background:var(--bg);border-radius:10px;padding:.875rem;text-align:center}
.ss-val{font-family:var(--mono);font-size:1.2rem;font-weight:700;margin-bottom:.2rem}
.ss-lab{font-size:.7rem;color:var(--muted)}
.spot-text .s-title{font-size:clamp(1.6rem,3vw,2.25rem)}
.feat-list{margin-top:1.5rem;display:flex;flex-direction:column;gap:.75rem}
.feat-item{display:flex;align-items:flex-start;gap:.75rem;font-size:.875rem;color:var(--muted2)}
.feat-check{
  width:20px;height:20px;border-radius:6px;background:var(--green-dim);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;
}
.feat-check::after{content:'✓';font-size:.65rem;color:var(--green);font-weight:700}
.spot-cta{margin-top:2rem;display:flex;gap:.75rem;flex-wrap:wrap}

/* ── SERVICES ── */
.services-bg{background:var(--bg)}
.svc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;margin-top:3rem}
.svc-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:16px;
  padding:1.5rem;transition:border-color .25s;
}
.svc-card:hover{border-color:var(--ai-dim2)}
.svc-ico{
  width:44px;height:44px;border-radius:12px;background:var(--ai-dim);
  display:flex;align-items:center;justify-content:center;font-size:1.25rem;margin-bottom:1rem;
}
.svc-name{font-size:1rem;font-weight:600;margin-bottom:.4rem}
.svc-desc{font-size:.82rem;color:var(--muted2);line-height:1.6;margin-bottom:.875rem}
.svc-from{font-size:.75rem;font-family:var(--mono);color:var(--ai-light)}

/* ── SOCIAL PROOF ── */
.proof-bg{background:var(--bg2)}
.proof-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;margin-top:3rem}
.proof-card{background:var(--bg);border:1px solid var(--border);border-radius:16px;padding:1.5rem}
.stars{color:var(--amber);font-size:.85rem;letter-spacing:2px;margin-bottom:.875rem}
.quote{font-size:.875rem;color:var(--muted2);line-height:1.7;margin-bottom:1.25rem;font-style:italic}
.reviewer{display:flex;align-items:center;gap:.75rem}
.rev-av{
  width:36px;height:36px;border-radius:50%;background:var(--ai-dim);
  display:flex;align-items:center;justify-content:center;
  font-size:.75rem;font-weight:700;color:var(--ai-light);flex-shrink:0;
}
.rev-name{font-size:.85rem;font-weight:600}
.rev-loc{font-size:.72rem;color:var(--muted)}

/* ── CONTACT ── */
.contact-bg{background:var(--bg)}
.contact-wrap{display:grid;grid-template-columns:1fr 1.2fr;gap:4rem;align-items:start;margin-top:3rem}
.pay-cards{display:flex;flex-direction:column;gap:.75rem;margin:2rem 0}
.pay-card{
  display:flex;align-items:center;gap:1rem;
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:.875rem 1.1rem;
}
.pay-ico{font-size:1.35rem;width:36px;text-align:center}
.pay-name{font-size:.875rem;font-weight:600}
.pay-sub{font-size:.72rem;color:var(--muted)}
.contact-note{font-size:.82rem;color:var(--muted);line-height:1.7}
.contact-note a{color:var(--ai-light)}
.form{display:flex;flex-direction:column;gap:.875rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.fg{display:flex;flex-direction:column;gap:.35rem}
.fg label{font-size:.72rem;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.fg input,.fg textarea,.fg select{
  background:var(--bg2);border:1px solid var(--border2);color:var(--white);
  padding:.7rem .9rem;border-radius:10px;font-size:.875rem;font-family:var(--head);
  transition:border-color .2s;outline:none;width:100%;
}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--ai)}
.fg input::placeholder,.fg textarea::placeholder{color:var(--muted)}
.fg select option{background:var(--bg2)}
.fg textarea{resize:vertical;min-height:90px}
.form-submit{
  background:var(--ai);color:#fff;border:none;
  padding:.85rem;border-radius:10px;font-size:.95rem;font-weight:600;
  cursor:pointer;font-family:var(--head);transition:all .2s;width:100%;margin-top:.25rem;
}
.form-submit:hover{background:#6a5ce8;transform:translateY(-1px)}
.form-ok{
  display:none;background:var(--green-dim);border:1px solid rgba(34,215,135,.25);
  color:var(--green);border-radius:10px;padding:.875rem 1rem;
  font-size:.85rem;margin-top:.5rem;
}

/* ── MODAL ── */
.modal-wrap{
  position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;
  display:none;align-items:center;justify-content:center;padding:1.5rem;
}
.modal-wrap.open{display:flex}
.modal{
  background:var(--bg2);border:1px solid var(--border2);border-radius:20px;
  padding:2rem;max-width:460px;width:100%;position:relative;
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-x{
  position:absolute;top:1rem;right:1rem;
  background:var(--bg3);border:1px solid var(--border);border-radius:50%;
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:.9rem;color:var(--muted);transition:all .2s;
}
.modal-x:hover{color:var(--white)}
.modal-product{font-size:1.25rem;font-weight:700;margin-bottom:.25rem}
.modal-desc{font-size:.82rem;color:var(--muted2);margin-bottom:.75rem}
.modal-price{font-family:var(--mono);font-size:2rem;font-weight:700;color:var(--ai-light);margin-bottom:1.5rem}
.pay-tabs{display:flex;gap:.5rem;margin-bottom:1.5rem}
.ptab{
  flex:1;padding:.55rem;border-radius:8px;font-size:.8rem;font-weight:600;
  border:1px solid var(--border2);background:transparent;color:var(--muted);
  cursor:pointer;transition:all .2s;font-family:var(--head);
}
.ptab.on{background:var(--ai);color:#fff;border-color:var(--ai)}
.ppanel{display:none;flex-direction:column;gap:.75rem}
.ppanel.on{display:flex}
.ppanel p{font-size:.82rem;color:var(--muted2)}
.ppanel strong{color:var(--white)}
.bank-box{background:var(--bg3);border-radius:10px;padding:1rem;font-size:.82rem;color:var(--muted2);line-height:1.9}
.bank-box strong{color:var(--white)}

/* ── FOOTER ── */
footer{
  background:var(--bg2);border-top:1px solid var(--border);
  padding:3rem 2.5rem;display:flex;flex-direction:column;align-items:center;gap:1.25rem;text-align:center;
}
.foot-brand{font-size:1.1rem;font-weight:700;letter-spacing:-0.02em}
.foot-brand span{color:var(--ai-light)}
.foot-links{display:flex;gap:2rem;flex-wrap:wrap;justify-content:center}
.foot-links a{font-size:.82rem;color:var(--muted);transition:color .2s}
.foot-links a:hover{color:var(--white)}
.foot-copy{font-size:.72rem;color:var(--muted)}

/* ── RESPONSIVE ── */
@media(max-width:900px){
